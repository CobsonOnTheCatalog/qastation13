author: boy2mantwicethefam
delete-after: true
changes:
- rscadd: The Staff of Necromancy now has a more elaborate description in the wizard's
    spellbook.
- rscadd: The Staff of Necromancy can now revive the undead that the wielder controls
    at the cost of a charge.
- rscadd: Staves, brooms and sticks now have a proper hit sound.
- rscdel: The Staff of Necromancy can no longer turn people into skeletons, which
    not only immediately prevented any recovery of the crewmember but was also generally
    punishing compared to zombification.
- rscdel: Zombies created by the Staff of Necromancy can no longer evolve into more
    dangerous types of zombies. Zombies that evolved would end up irrecoverable (and
    most players are unaware of this), and the zombie horde will no longer escalate
    to an insane degree due to an infectious variant that zombies could evolve into.
    Now go on and bring them back from zombification with your trusty bible instead
    of butchering them!
- tweak: The Staff of Necromancy now gains charges every 20 seconds instead of 8.
    The duration can still be halved if the wielder is a lich!
- tweak: Player-controlled monkeys will now properly control animal ghouls when converted
    into one.
- tweak: The Staff of Necromancy will now provide more feedback in regards to its
    uses, and now also shows the number of charges it has upon being examined. In
    addition, wizards can see a special description of the staff upon examining it,
    detailing its features.
- tweak: Zombies attempting to evolve will now be shown more feedback in regards to
    their capability to evolve, such as what they must do in order to evolve. They
    will also no longer have the spell button to evolve if they are not supposed to
    evolve.
- tweak: The Staff of Necromancy can no longer convert the leatherman to the wielder's
    side.
- tweak: Raising meat as undead with the Staff of Necromancy now costs half a charge.
- bugfix: The Staff of Necromancy will now properly behave like a weapon without having
    any odd interactions such as repeatedly hitting windows with no damage.
- bugfix: The Staff of Necromancy now has a proper limit of 3 charges instead of gaining
    charges indefinitely.
- bugfix: The Staff of Necromancy will no longer attempt to convert zombies that already
    belong to the wielder's side.
- bugfix: Fixed a bug where the Staff of Necromancy wouldn't show off its particle
    effects upon a successful zombification due to the original target being gone.
- bugfix: Fixed a 2-year-old bug where the Staff of Necromancy created the wrong zombies;
    zombifying meat will now properly turn it into a meat ghoul and zombifying dead
    animals will now properly turn them into animal ghouls.
