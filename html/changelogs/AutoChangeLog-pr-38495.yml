author: DeityLink
delete-after: true
changes:
- rscadd: Revamped the druggy visuals, pay a visit to your local chemist, and set
    up some weak lights in a low light room for the best results. Try various light
    colors and observe how the shadows move around on their own!
- tweak: Space Drugs can now raise drugginess higher than it used to if it remains
    long enough in your system (still not as high as psylocibin or hippie's delight)
- tweak: Adjusted the rate at which Hippie's Delight and Poison Wine raise drugginess.
    (kinda fixed it as well)
