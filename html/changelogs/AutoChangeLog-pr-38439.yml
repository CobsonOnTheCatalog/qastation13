author: SECBATON-GRIFFON
delete-after: true
changes:
- tweak: The rotate clockwise and counterclockwise verb on machinery no longer appears
    if the machine is anchored, more consistently.
- rscadd: The MSGS, pressure tanks, freezers, heaters, mass driver frames, mannequins,
    windoor assemblies, mech bay recharge ports, beam mirrors and prisms, TEG parts,
    treadmills, wheelchair cannon assemblies, siege cannons, disposal pipe pieces
    and pod frame parts can be rotated on alt click, if unanchored where applicable
    to their verb.
- bugfix: Ghosts or unconscious people can no longer rotate beam mirrors or prisms.
- spellcheck: All formatting for object rotation failure via verb or alt click now
    formats as a warning.
