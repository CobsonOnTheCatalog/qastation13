author: DeityLink
delete-after: true
changes:
- rscadd: 'Cult: The Obsidian Pillars that spawn across the station during the bloodstone
    phase now emit a stream of blood particles that drift straight toward the bloodstone,
    revealing its location to the crew much more explicitely.'
- rscadd: "Cult: The Obsidian Pillars also show up on the cult altar's holomap now\
    \ because it looks neat."
- bugfix: 'Cult: Fixed many items (surgery tools for instance) being unable to damage
    cult buildings due to subtype shenanigans. This is especially beneficial to the
    crew as melee weapons deal extra damage to cult buildings, a circular saw can
    break the Bloodstone in 30 hits.'
- bugfix: 'Cult: Fixed only the first 4 of the crystals on the Tear Reality ritual
    lighting up. All 8 crystals will now light up as the dance proceeds.'
