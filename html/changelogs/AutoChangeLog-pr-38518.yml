author: DeityLink
delete-after: true
changes:
- tweak: Some large Xenoarch artifact effects have been merged together. Namely, Cold
    and Heat have been merged as Temperature, Planthelper and Plantkiller have been
    merged as Planttender, Goodfeeling and Badfeeling have been merged as Mood, Cellcharge
    and Celldrain have been merged as Cellbattery, and Roboheal and Robohurt have
    been merged as Roboelectro. That's 5 less effect types in the pool, increasing
    ever so slightly the chance for other more unique effect types to appear. If one
    of those new effects gets selected, it will have a chance to be either the positive
    or negative variant (or in the case of temperature, target a range of temperature
    going from 0 to 600 Kelvin)
- tweak: The Planttender Xenoarch artifact effect increases weeds in empty hydroponic
    trays regardless of variant.
- tweak: The positive variant of the Mood Xenoarch artifact effect now makes people
    druggy instead of dizzy.
- tweak: Each large Xenoarch artifact effect now only has one possible hint given
    when analyzed (some effect could have any from one to FOUR possible hints, with
    some hints shared by as many as 17 different effect types). This drastically helps
    identifying the effect type.
