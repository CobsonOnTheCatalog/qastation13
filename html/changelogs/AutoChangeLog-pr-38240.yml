author: boy2mantwicethefam
delete-after: true
changes:
- bugfix: Fixed a bug where the "Heal Other" spell would apply its healing twice to
    a target if it had the splashing upgrade.
- bugfix: Fixed a bug where the "Heal Other" spell would not apply its empowered healing
    to targets in an AoE.
- tweak: The "Heal Other" spell has been greatly buffed. Its healing is now slightly
    more than tripled, the cooldown reduction per cooldown upgrade is an additional
    2.5 seconds, it now reduces stun durations by 10 seconds and disorienting effects
    by 20 seconds, can now be fully upgraded instead of only being upgraded 3 times
    out of 4, had its empowerment and range upgrade costs reduced to 10 points, and
    the empowered version now also stops bleeding.
