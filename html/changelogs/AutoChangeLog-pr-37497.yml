author: SECBATON-GRIFFON
delete-after: true
changes:
- rscadd: Lockboxes of various kinds now come with access electronics inside, removable
    with a screwdriver once unlocked, with the ability to modify them outside and
    place them back in again.
- rscadd: Lockboxes can now be crafted from one sheet of plasteel. Access electronics
    come separately, so please remember to bring some.
- rscadd: Large diskette boxes, vial boxes and empty lockboxes can now be made at
    the protolathe; with materials level 2, except for large diskette boxes requiring
    level 3.
- rscadd: Emag-broken lockboxes can now be repaired with a soldering iron.
- rscadd: Many kinds of lockboxes now have materials they can recycle into at fabricators.
- tweak: Airlock electronics have been renamed to access electronics, as their scope
    is much broader in use now.
- tweak: Unlocked coinboxes made with sheets of metal now come without access electronics.
    Autolathe-made ones keep them.
- tweak: ID cards can now be put inside lockboxes by clicking on the storage HUD spaces.
