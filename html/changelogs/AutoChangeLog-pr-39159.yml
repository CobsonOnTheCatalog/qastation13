author: west3436
delete-after: true
changes:
- bugfix: Fixed the Supply Shuttle being non-functional on Odyssey due to a variety
    of reasons.
- bugfix: Fixed the incorrectly-configured buttons and conveyor belts in the NT Outpost
    Cargo Bay.
- bugfix: Fixed NT Outpost buildings showing weather indoors.
- bugfix: Fixed ROSA panels getting losing sync with their control button.
- bugfix: Fixed First Mate not being included as a Head of Staff in the latejoin menu.
- bugfix: Added a button to access Virology at the NT Outpost.
- bugfix: Anchored the gas extractors in Odyssey so that they properly link with the
    miner and console.
- bugfix: Shuttles should no longer spawn right next to the transition region in encounter
    areas.
- bugfix: The CMC no longer fails to detect people on a shuttle.
- bugfix: Weather visual, audio, and physical (damaging) effects will always clear
    when entering a shuttle from a planet.
- bugfix: GPSes will now work on a shuttle if it could normally operate outside of
    the shuttle on the current vLevel the shuttle occupies.
- bugfix: Added a unique Comms Console to Odyssey which allows use regardless of vLevel.
- bugfix: Fixed incorrect phone mappings preventing certain phones to show up in "unknown"
    departments.
- bugfix: Fixed inconsistent comms in Odyssey; the ship now has its own relay.
- bugfix: Fixed the conveyor belts in the ore processing room at the NT Outpost not
    functioning properly.
- bugfix: References to the Emergency Shuttle will no longer be announced in NTEV
    Odyssey.
- tweak: The Odyssey solar flare event will no longer break all of the lights on the
    shuttle.
- tweak: Non-human mobs will now be deleted entirely when a shuttle lands on them
    instead of gibbing them and making a mess on the shuttle.
- tweak: Renamed "Assistant" to "Deckhand" on Odyssey.
- tweak: Added some lights to some dark regions in the NT Outpost.
- tweak: Added a unique CMC for Odyssey which always shows the location of crewmembers
    with suit sensors on in the vLevel the console is currently occupying.
- tweak: Wired the unique Odyssey events into the existing events controller.
