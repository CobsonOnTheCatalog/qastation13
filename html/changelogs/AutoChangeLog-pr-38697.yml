author: SECBATON-GRIFFON
delete-after: true
changes:
- rscadd: Warden, detective and internal affairs agent offices now support disposals
    with sorting junctions for deliveries. They have been added to all the relevant
    maps.
- rscadd: Sorting junctions now support more than one destination tag. Destination
    taggers will now have a toggle between adding to these or replacing them, defaulting
    at replacing. The blobs of pipes that output to both security and heads of security
    have now been replaced with a single multiple output general security department
    sorting junction on all relevant maps. (Note that this does not affect deliveries,
    as these are further separated along their disposal lines afterwards)
