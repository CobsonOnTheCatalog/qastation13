author: west3436
delete-after: true
changes:
- bugfix: Fixed incorrect in/out dirs in the ore processing room.
- bugfix: Fixed the stasis room lightswitch being covered by the APC.
- bugfix: Fixed the bridge lobby turfs changing colors.
- bugfix: Fixed micro meteors not working.
- tweak: CMC on Odyssey can now track players on planets.
- tweak: Stasis beds now open up the job slot the user occupied.
- tweak: Increased the Odyssey pre-flight delay to 30s.
- tweak: Enabled weather and day/night effects on external shuttle structures.
- tweak: Added more a few more job spawns to Odyssey.
- tweak: Added a visual indicator at the transition edge of an encounter zone.
- tweak: Added a pAI to Odyssey.
- tweak: Blueprints can now add additional areas to a shuttle.
- tweak: Hyperspace levels will no longer have persistent gibs/objs/mobs.
- tweak: Odyssey crew now will have a 5 second notice before micro meteors strike.
