author: SECBATON-GRIFFON
delete-after: true
changes:
- rscadd: Two new nanobot recipes are available, energetic and cargonian nanobots!
    Energetic nanobots are made with 1 part nanobots and 10 parts ferro-uranium. (which
    in turn is made by mixing iron and uranium, which still also causes EMPs)
- rscadd: Adds energetic nanobots, which allow players to recharge things they're
    holding such as energy guns, stun batons and defibrilators; and be used as a power
    source on conductor plates. Splashing them on the relevant objects works for recharging
    them too, and on floors creates harvestable power for all radiation collectors
    nearby, scaled on volume for range. They also heal radiation at a decent rate.
    Overdosing on them at over 10 units causes players to be shocked by any cable
    underneath them to the power of the grid, if possible.
- rscadd: Adds cargonian nanobots, which causes players to announce their allegiance
    to Cargonia at random intervals. Aside from this, it lets players build crates,
    coinboxes, notice boards, barricades, conveyors and turret frames twice as fast;
    and break open crates with guns twice as fast. Taking more than 10 units of this,
    however, makes players have a strong tendency to want gun crates in cargo orders
    too. Splashing them on crates weakens them, making them easier to open.
