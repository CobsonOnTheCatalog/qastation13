author: SonixApache
delete-after: true
changes:
- rscadd: The most important holiday of the year, Pakjesavond van het Sinterklaasfeest,
    now has some more content.
- rscadd: The Staff of Sinterklaas that can only be bought by wizards on the 5th of
    December now gives its jovial targets a spell that lets them summon candy. Said
    candy is great for throwing at people.
- rscadd: Seasonal cookies now have Sinterklaas variants, only on the 5th.
- rscadd: Chocolate letters! Write a single letter on a piece of paper, add it to
    the microwave, then add a chocolate bar.
- rscadd: Taaitaai! 5u cinnamon, sugar, flour and water for 6.
