author: gurfan
delete-after: true
changes:
- bugfix: Fixes enabling VOX corruption in the AI announcement menu causing the menu
    to 404. Also removes the option on the menu to change voice styles because the
    masculine voice is dead. RIP.
- bugfix: Fixes Nikita rockets disappearing instead of detonating after they run out
    of fuel, or when they collide with another projectile.
- bugfix: Fixes certain printed items at a Protolathe having 1 unit of every material
    in the game. Also fixes the large energy crossbow giving 50 sheets worth of metal
    when recycled, for some reason.
- bugfix: Fixes non-admin ghosts being able to open/close tabledoors.
