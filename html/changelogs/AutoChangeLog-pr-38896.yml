author: DeityLink
delete-after: true
changes:
- bugfix: Fixed players with bloody feet not adding footprints when leaving a tile,
    only when arriving on one, resulting in only half the expected footprints showing
    up (this bug has been around for 4 years, thanks for the fix Exxion).
- bugfix: Fixed bloody footprints sometimes not appearing red when the Noir gene is
    enabled despite being red.
- bugfix: Fixed some blood splatters not being affected by blurriness/nearsightedness
- bugfix: Fixed the blindness overlay sometimes going away and causing runtimes (namely
    when someone dies then gets defib'd)
- bugfix: Fixed observers being unable to properly zoom in
