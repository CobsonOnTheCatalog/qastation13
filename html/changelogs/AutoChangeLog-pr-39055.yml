author: SECBATON-GRIFFON
delete-after: true
changes:
- rscadd: Wood planks and logs now grind into sawdust, which can be used to sand floors
    and briefly blind people.
- rscadd: Wood planks and logs, books, newspaper and paper now juices into pulp, at
    20, 5, 2 and 1 units each respectively. Tower cap logs also grind into this, along
    with wood apples which also grind sugar.
- rscadd: Pulp can be solidified into wood again at 20 units, with equal parts silicate
    and frostoil.
