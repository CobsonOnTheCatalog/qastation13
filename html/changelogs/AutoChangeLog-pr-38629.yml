author: west3436
delete-after: true
changes:
- rscadd: Added an Exploration Shuttle to every station currently equipped with a
    Deep Space Scanner. Comes with a Guide to Planetary Exploration and basic supplies
    for a crew of 5.
- rscadd: Any head with proper access can now disable the Deep Space Scanner and send
    the Exploration Shuttle back to Central via the Communications Console.
- rscadd: Added animations to shuttles taking off, traveling, and landing.
- rscadd: Added an animation to the shuttle engine heater.
- rscadd: Added a landing alert animation to planetary turfs - no more shuttlecrushing
    friendlies!
- rscadd: Admins can now add planetary landing zones to the Exploration Shuttle directly
    from the Procedural Generation Panel.
- rscadd: Admins can now disable planet generation via the PGP.
- rscadd: Admins can now hide planets from the Deep Space Scanner.
