author: Eneocho
delete-after: true
changes:
- rscadd: Mint plants have been added to the hydroponics seed vendor.
- rscadd: Mint essence can be concentrated into its pure toxin form by heating it
    to 100°C.
- tweak: Mint toxin is now toxic to diona, shrooms, catbeasts and insectoids if ingested.
    Mint essence remains non-toxic.
- tweak: Mint toxin and Mint essence now work as tray insecticides/deweeders. Mint
    toxin is also slightly toxic to the plant itself, so be careful when using it.
- imageadd: Reusing the old defunct shand icons with some tweaks here and there.
