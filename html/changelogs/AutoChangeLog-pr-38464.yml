author: SECBATON-GRIFFON
delete-after: true
changes:
- rscadd: Small machine frames can now be built in metal stack recipes. Unlike the
    normal kind, these are only made out of 2 metal sheets instead of 5, require 2
    cables instead of 5 and take only 1 second to build instead of 2.5, and can pass
    through tables.
- tweak: Firefoam poppers, fax machines, microwaves, rechargers, cell chargers and
    grinders can no longer be built with normal machine frames, they must be built
    with the smaller variety, constructable from the same stack recipe menu for less.
    Their circuitboards have been reduced in material amount and size too.
- tweak: The constructable frame circuit type rejection message now specifies what
    type of frame the circuitboard fits.
