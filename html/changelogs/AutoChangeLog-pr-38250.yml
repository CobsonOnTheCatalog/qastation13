author: boy2mantwicethefam
delete-after: true
changes:
- tweak: Drastically increased the surgeon switchtool's price in the Protolathe to
    compensate for the material costs of the surgery tools it contains. To compensate
    for this a second empty variant has been added which doesn't contain any item,
    which should be printed faster than the full variant.
- tweak: Nanopaste, medical kits and lockboxes printed from fabricators can no longer
    be recycled.
- bugfix: Fixed a decade-old bug where items printed at fabricators would only contain
    one material. This happened because as the code went through each material to
    readjust it when printed it would reset the list of materials each time.
- bugfix: Contents of printed items at fabricators such as the Protolathe will now
    also have their materials adjusted.
- bugfix: The high-precision laser scalpel and high-precision laser cautery now contain
    uranium.
