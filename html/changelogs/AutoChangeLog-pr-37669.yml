author: SECBATON-GRIFFON
delete-after: true
changes:
- rscadd: Screwsolders now accept polytrinic acid for faster soldering, and 1.5x more
    damage in attacks.
- rscadd: Gatling welder tools now accept plasma for faster welding, and 1.5x more
    damage in attacks, plus emitting a more plasma level natural heat.
- rscadd: Welders can now accept fuel from reagent containing items, in order to make
    refueling them with plasma easier, if possible.
