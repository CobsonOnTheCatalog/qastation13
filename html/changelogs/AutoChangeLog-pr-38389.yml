author: SECBATON-GRIFFON
delete-after: true
changes:
- rscadd: Syndicate agents can now purchase the seismic artillery remote for 2 telecrystals
    in the sabotage section, or for 1 telecrystal if in science positions. This allows
    the creation of a fake explosion effect in the area that gets reported to bhangmeters.
    Cooldown is 1 minute per every level of devastation up to a maximum of 8.
- rscadd: Honk serum can be mixed with potassium to create fake explosion effects,
    or with polyacid and suphuric acid for larger ones. Bhangmeters do not recognise
    them, though.
- tweak: Admin fake explosions now have an option to be detected by bhangmeters.
