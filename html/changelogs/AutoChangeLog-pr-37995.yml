author: boy2mantwicethefam
delete-after: true
changes:
- bugfix: Batons on harm intent will now properly miss instead of applying a stun
    while missing.
- bugfix: Batons on harm intent will no longer check for shields twice, which caused
    shields to have a roughly 72% chance of blocking stunbatons.
- bugfix: Thrown batons no longer have an unintentional chance to stun cyborgs. Cyborgs
    are not supposed to be stunned by it.
- bugfix: Batons on harm intent will no longer play a hit sound when missing the target,
    and fixed a bug where the hit sound would play twice.
