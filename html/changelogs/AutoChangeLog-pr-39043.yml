author: Eneocho
delete-after: true
changes:
- rscadd: 'Added 5 new mint drinks: Frostbite, Minty Mule, Old Cuban, Caipirinha and
    English Garden, all require some amount of mint essence, except Frostbite, which
    takes mint toxin instead.'
- tweak: The Mojito recipe now also asks for 1u of Mint essence (and makes 1u more
    per reaction).
- tweak: The Orzo Salad recipe now asks for the mint plant instead of the mint candy.
- tweak: Mint candies are now either be made with the mint plant instead of aloe,
    or by replacing the mint with mint toxin.
- rscadd: Adds a new explicitly invalid reagent ID subvariant for use on a child of
    a preexisting one.
