author: SECBATON-GRIFFON
delete-after: true
changes:
- rscadd: Book binders can now set the name, author, cover, and spine of a book; and
    use multiple sheets to bind into one book. They have been given a UI to facilitate
    this. They can now also accept upgrades for faster binding, and have a circuitboard
    allowing for easier construction of these machines from R&D.
- rscadd: "Barcode scanners now if they are linked to a computer on examining, and\
    \ now have their mode system replaced with a priority one: first, it checks if\
    \ the book is in the library inventory and adds it if it isn't, then checks it\
    \ in if checked out, and then finally adds it to the buffer if neither is possible.\
    \ This even works on bookbags with books inside it."
