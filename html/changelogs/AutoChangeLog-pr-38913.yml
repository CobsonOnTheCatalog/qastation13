author: gurfan
delete-after: true
changes:
- rscadd: Added support for custom blood overlays and surgery-specific blood overlays.
- rscadd: 'Adds surgical blood overlays for the (unupgraded) scalpel, hemostat, retractor
    and circular saw.  (Sprites Credit: Kilozombie)'
- bugfix: Fixes items sometimes not getting bloodied the first time blood is applied.
- tweak: Most surgery steps will now bloody hands (and tools) by default.
- tweak: Very bloody surgery steps (previously only alien embryo removal and sex changes)
    will now spray blood at the surgeon.
- tweak: Cutting off a limb is now a very bloody surgery step.
