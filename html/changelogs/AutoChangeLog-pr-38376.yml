author: jwhitak
delete-after: true
changes:
- tweak: Plasma Cutters are now called Advanced Plasma Cutters
- imageadd: Advanced Plasma Cutters have a new sprite with ammo meter
- tweak: Plasma Torches are once again called Plasma Cutters
- imageadd: Both cutters now have unique in-hands.
- tweak: Plasma Cutter Conversion Kits now only require a Plasma Cutter (+pka) instead
    of a Diamond Drill (+pka), but have an additional diamond cost to compensate
- tweak: Plasma Cutters mine in 1.5 seconds, up from 2 seconds
- tweak: Advanced Plasma Cutter plasma ore reloading is slower, but cooler (smelted
    plasma remains a full, instant load)
